name: Build e Deploy para Hostinger

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Build de produção
        run: npm run build

      - name: Deploy via FTP para Hostinger
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp

          LFTP_SETTINGS="set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate false; set ftp:passive-mode true; set net:timeout 120; set net:max-retries 10; set net:reconnect-interval-base 5; set net:reconnect-interval-multiplier 1;"

          # Single session: mirror uploads assets/ before index.html (alphabetical order).
          # Explicit put at the end guarantees index.html is always the last file written,
          # so users never get new HTML pointing to assets that haven't arrived yet.
          LFTP_CMD="mirror --reverse --delete --no-perms --verbose ./dist/ public_html/; put ./dist/index.html -o public_html/index.html; bye"

          for attempt in 1 2 3; do
            echo ">>> Deploy attempt $attempt/3"
            if lftp -u "u147485162.penhora.app.br,$FTP_PASSWORD" ftp://45.152.44.230 \
                 -e "$LFTP_SETTINGS $LFTP_CMD"; then
              echo ">>> Deploy successful on attempt $attempt"
              exit 0
            fi
            echo ">>> Attempt $attempt failed. Waiting 15s before retry..."
            sleep 15
          done

          echo ">>> All 3 deploy attempts failed."
          exit 1
