name: Build e Deploy para Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Build de produção
        run: npm run build

      - name: Deploy via FTP para Hostinger
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp

          # Connection settings — generous timeouts to handle Hostinger transient drops
          LFTP_SETTINGS="
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set ftp:passive-mode true;
            set ftp:use-feat false;
            set ftp:prefer-epsv false;
            set net:timeout 180;
            set net:max-retries 15;
            set net:reconnect-interval-base 8;
            set net:reconnect-interval-multiplier 1;
            set net:connection-limit 4;
            set mirror:use-pget-n 4;
          "

          # assets/ uploaded before index.html so users never get stale HTML
          # pointing to assets that haven't landed yet.
          LFTP_CMD="mirror --reverse --delete --no-perms --verbose --ignore-time ./dist/ public_html/; put ./dist/index.html -o public_html/index.html; bye"

          MAX=6
          WAIT=30
          for attempt in $(seq 1 $MAX); do
            echo ">>> Deploy attempt $attempt/$MAX"
            if lftp -u "u147485162.penhora.app.br,$FTP_PASSWORD" ftp://45.152.44.230 \
                 -e "$LFTP_SETTINGS $LFTP_CMD"; then
              echo ">>> Deploy successful on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt "$MAX" ]; then
              echo ">>> Attempt $attempt failed. Waiting ${WAIT}s before retry..."
              sleep $WAIT
              WAIT=$((WAIT + 15))
            fi
          done

          echo ">>> All $MAX deploy attempts failed."
          exit 1
