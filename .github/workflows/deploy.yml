name: Build e Deploy para Hostinger

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Build de produção
        run: npm run build

      - name: Deploy via FTP para Hostinger
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp

          LFTP_SETTINGS="set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate false; set ftp:passive-mode true; set net:timeout 120; set net:max-retries 10; set net:reconnect-interval-base 5; set net:reconnect-interval-multiplier 1;"

          # Step 1: Upload all files EXCEPT index.html (assets first, so they exist before the entrypoint)
          LFTP_MIRROR_ASSETS="mirror --reverse --delete --no-perms --exclude index.html --verbose ./dist/ public_html/; bye"

          # Step 2: Upload index.html last — only after all assets are in place
          LFTP_UPLOAD_INDEX="put -O public_html/ ./dist/index.html; bye"

          for attempt in 1 2 3; do
            echo ">>> Deploy attempt $attempt/3"
            if lftp -u "u147485162.penhora.app.br,$FTP_PASSWORD" ftp://45.152.44.230 \
                 -e "$LFTP_SETTINGS $LFTP_MIRROR_ASSETS" && \
               lftp -u "u147485162.penhora.app.br,$FTP_PASSWORD" ftp://45.152.44.230 \
                 -e "$LFTP_SETTINGS $LFTP_UPLOAD_INDEX"; then
              echo ">>> Deploy successful on attempt $attempt"
              exit 0
            fi
            echo ">>> Attempt $attempt failed. Waiting 15s before retry..."
            sleep 15
          done

          echo ">>> All 3 deploy attempts failed."
          exit 1
